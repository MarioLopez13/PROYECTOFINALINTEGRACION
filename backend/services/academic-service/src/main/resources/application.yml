spring:
  application:
    name: academic-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/academic_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:campus}
    password: ${DB_PASSWORD:campus}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:campus}
    password: ${RABBITMQ_PASSWORD:campus}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1s
          max-attempts: 3
          multiplier: 2

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
