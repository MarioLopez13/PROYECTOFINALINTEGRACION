spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: academic-service
              uri: ${ACADEMIC_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/academic/**
            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/payments/**
            - id: attendance-service
              uri: ${ATTENDANCE_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/attendance/**
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/notifications/**
            - id: analytics-service
              uri: ${ANALYTICS_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/analytics/**

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
